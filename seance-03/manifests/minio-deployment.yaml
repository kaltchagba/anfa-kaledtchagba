# minio-deployment.yaml
# ─────────────────────────────────────────────────────────────
# Deployment : décrit le pod MinIO et son cycle de vie.
# Kubernetes maintient toujours le nombre de replicas souhaité (self-healing).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: anfa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio            # le Deployment gère les pods portant ce label
  template:
    metadata:
      labels:
        app: minio          # doit correspondre à selector.matchLabels
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ROOT_USER
              value: "anfa-admin"
            - name: MINIO_ROOT_PASSWORD
              value: "anfa-password-2026"
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: minio-storage
              mountPath: /data       # MinIO stocke ses données dans /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: minio-storage
          persistentVolumeClaim:
            claimName: minio-pvc    # référence le PVC créé dans minio-pvc.yaml
